<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hero Squad">
<title>Hero Study Squad — Syariff & Raisya</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #07091c;
    --gold: #e8b84b;
    --gold-soft: #f5d07a;
    --syariff: #38bdf8;
    --raisya: #f472b6;
    --green: #4ade80;
    --white: #f0f6ff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    background: var(--night);
    font-family: 'Nunito', sans-serif;
    color: var(--white);
    overflow-x: hidden;
  }

  /* ── SKY ── */
  .sky {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 0%, #1a1f5a 0%, transparent 55%),
      radial-gradient(ellipse at 80% 5%, #0d2a40 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, #0f1a3a 0%, transparent 60%),
      var(--night);
  }

  /* Stars */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .s {
    position: absolute; border-radius: 50%; background: #fff;
    animation: twinkle var(--d,3s) ease-in-out infinite;
    animation-delay: var(--dl,0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: var(--op,.6); transform: scale(1); }
    50%      { opacity: .1; transform: scale(.6); }
  }

  /* Shooting star */
  .shoot {
    position: fixed; top: 15%; left: -5%;
    width: 2px; height: 2px; background: white;
    border-radius: 50%;
    box-shadow: 0 0 6px 2px rgba(255,255,255,0.6);
    animation: shoot 6s ease-in infinite;
    animation-delay: 3s;
    z-index: 0;
  }
  .shoot::after {
    content: '';
    position: absolute; top: 50%; right: 0;
    width: 80px; height: 1px;
    background: linear-gradient(to left, rgba(255,255,255,0.6), transparent);
    transform: translateY(-50%);
  }
  @keyframes shoot {
    0%   { transform: translate(0,0) rotate(20deg); opacity: 1; }
    20%  { opacity: 1; }
    40%  { transform: translate(110vw, 40vh) rotate(20deg); opacity: 0; }
    100% { transform: translate(110vw, 40vh) rotate(20deg); opacity: 0; }
  }

  /* Moon */
  .moon {
    position: fixed; top: 24px; right: 32px; z-index: 1;
    font-size: 3.5rem; pointer-events: none;
    filter: drop-shadow(0 0 24px rgba(232,184,75,0.55));
    animation: moonbob 7s ease-in-out infinite;
  }
  @keyframes moonbob {
    0%,100% { transform: translateY(0) rotate(-8deg); }
    50%      { transform: translateY(-10px) rotate(-3deg); }
  }

  /* ── MAIN LAYOUT ── */
  .page {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
    gap: 0;
  }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 44px; }

  .arabic {
    font-family: 'Amiri', serif;
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    color: var(--gold);
    display: block; margin-bottom: 4px;
    text-shadow: 0 0 24px rgba(232,184,75,0.4);
    animation: fadeDown .8s ease both;
  }

  .title {
    font-family: 'Amiri', serif;
    font-size: clamp(2rem, 7vw, 4rem);
    color: var(--gold-soft);
    letter-spacing: 2px; line-height: 1.1;
    text-shadow: 0 0 40px rgba(232,184,75,.25);
    animation: fadeDown .9s ease both;
  }

  .divider {
    display: flex; align-items: center; gap: 14px;
    justify-content: center; margin: 10px 0 0;
    animation: fadeDown 1s ease both;
  }
  .divider-line { width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--gold)); }
  .divider-line.r { background: linear-gradient(to left, transparent, var(--gold)); }
  .divider-text { font-size: .8rem; font-weight: 800; letter-spacing: 3px; color: rgba(240,246,255,.45); }

  /* ── HERO AVATARS ── */
  .avatars {
    display: flex; gap: 28px; justify-content: center;
    margin-bottom: 44px;
    animation: fadeUp 1s ease .2s both;
  }

  .avatar-wrap { text-align: center; }
  .avatar {
    width: 90px; height: 90px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.6rem;
    animation: float 4s ease-in-out infinite;
    position: relative;
  }
  .av-syariff {
    background: radial-gradient(circle at 35% 35%, #1a4a7a, #05122a);
    border: 2px solid rgba(56,189,248,.45);
    box-shadow: 0 0 24px rgba(56,189,248,.25), 0 0 60px rgba(56,189,248,.1);
  }
  .av-raisya {
    background: radial-gradient(circle at 35% 35%, #5a1a50, #1a0528);
    border: 2px solid rgba(244,114,182,.45);
    box-shadow: 0 0 24px rgba(244,114,182,.25), 0 0 60px rgba(244,114,182,.1);
    animation-delay: -2s;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  .av-name {
    font-family: 'Amiri', serif;
    font-size: 1.1rem; margin-top: 8px; font-weight: 700;
  }
  .av-syariff-name { color: var(--syariff); }
  .av-raisya-name  { color: var(--raisya); }

  /* Avatar image support */
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }


  /* ── BIG BUTTONS ── */
  .buttons {
    display: flex; flex-direction: column; gap: 18px;
    width: 100%; max-width: 460px;
    animation: fadeUp 1s ease .35s both;
  }

  .big-btn {
    display: flex; align-items: center; gap: 20px;
    padding: 22px 28px; border-radius: 22px;
    text-decoration: none; color: var(--white);
    position: relative; overflow: hidden;
    transition: transform .3s, box-shadow .3s;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .big-btn:hover { transform: translateY(-4px) scale(1.02); }
  .big-btn:active { transform: scale(.98); }

  /* Shimmer sweep */
  .big-btn::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,.08), transparent);
    transform: skewX(-20deg);
    transition: left .5s ease;
  }
  .big-btn:hover::before { left: 150%; }

  .btn-jadual {
    background: linear-gradient(135deg, #071a38 0%, #0d2a55 60%, #071a38 100%);
    border-color: rgba(56,189,248,.35);
    box-shadow: 0 8px 32px rgba(56,189,248,.18), inset 0 1px 0 rgba(56,189,248,.15);
  }
  .btn-jadual:hover {
    box-shadow: 0 14px 48px rgba(56,189,248,.32), inset 0 1px 0 rgba(56,189,248,.2);
    border-color: rgba(56,189,248,.6);
  }

  .btn-ramadan {
    background: linear-gradient(135deg, #150a28 0%, #220d40 60%, #150a28 100%);
    border-color: rgba(232,184,75,.35);
    box-shadow: 0 8px 32px rgba(232,184,75,.15), inset 0 1px 0 rgba(232,184,75,.12);
  }
  .btn-ramadan:hover {
    box-shadow: 0 14px 48px rgba(232,184,75,.28), inset 0 1px 0 rgba(232,184,75,.2);
    border-color: rgba(232,184,75,.6);
  }

  .btn-icon {
    font-size: 2.8rem; flex-shrink: 0;
    filter: drop-shadow(0 0 8px rgba(255,255,255,.3));
    animation: btnFloat 3s ease-in-out infinite;
  }
  .btn-ramadan .btn-icon { animation-delay: -1.5s; }
  @keyframes btnFloat {
    0%,100%{ transform: rotate(-5deg) scale(1); }
    50%    { transform: rotate(5deg) scale(1.1); }
  }

  .btn-text { flex: 1; }
  .btn-title {
    font-size: clamp(1.1rem, 3.5vw, 1.4rem);
    font-weight: 900; letter-spacing: .5px; display: block;
    margin-bottom: 4px;
  }
  .btn-jadual  .btn-title { color: var(--syariff); }
  .btn-ramadan .btn-title { color: var(--gold-soft); }

  .btn-sub {
    font-size: .8rem; font-weight: 700;
    opacity: .55; letter-spacing: .5px;
  }

  .btn-arrow {
    font-size: 1.4rem; opacity: .5;
    transition: transform .3s, opacity .3s;
  }
  .big-btn:hover .btn-arrow { transform: translateX(5px); opacity: 1; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 48px; text-align: center;
    animation: fadeUp 1s ease .5s both;
  }
  .footer-dua {
    font-family: 'Amiri', serif;
    font-size: 1rem; color: var(--gold);
    opacity: .55; letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .footer-sub {
    font-size: .72rem; font-weight: 800;
    letter-spacing: 2px; opacity: .3;
    text-transform: uppercase;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity:0; transform: translateY(-20px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (min-width: 600px) {
    .buttons { flex-direction: row; max-width: 700px; }
    .big-btn { flex-direction: column; align-items: flex-start; padding: 28px 26px; flex: 1; }
    .btn-arrow { align-self: flex-end; margin-top: auto; }
  }
</style>
</head>
<body>

<div class="sky"></div>
<div id="stars"></div>
<div class="shoot"></div>
<div class="moon">🌙</div>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <span class="arabic">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span>
    <div class="title">Hero Study Squad</div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">SYARIFF & RAISYA</div>
      <div class="divider-line r"></div>
    </div>
  </div>

  <!-- AVATARS -->
  <div class="avatars">
    <div class="avatar-wrap">
      <div class="avatar av-syariff">
        <img src="syariff.jpg" alt="Syariff">
      </div>
      <div class="av-name av-syariff-name">Syariff</div>
    </div>
    <div class="avatar-wrap">
      <div class="avatar av-raisya">
        <img src="raisya.jpg" alt="Raisya">
      </div>
      <div class="av-name av-raisya-name">Raisya</div>
    </div>
  </div>

  <!-- BIG BUTTONS -->
  <div class="buttons">

    <a class="big-btn btn-jadual" href="jadual_ulangkaji_v2.html">
      <div class="btn-icon">📚</div>
      <div class="btn-text">
        <span class="btn-title">Jadual Belajar</span>
        <span class="btn-sub">Ulangkaji · Power Level · Reward</span>
      </div>
      <div class="btn-arrow">›</div>
    </a>

    <a class="big-btn btn-ramadan" href="ramadan_tracker.html">
      <div class="btn-icon">🌙</div>
      <div class="btn-text">
        <span class="btn-title">Ramadan Tracker</span>
        <span class="btn-sub">Ibadah · Pahala · Reward Raya</span>
      </div>
      <div class="btn-arrow">›</div>
    </a>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-dua">اللَّهُمَّ انْفَعْنَا بِمَا عَلَّمْتَنَا</div>
    <div class="footer-sub">Ya Allah, manfaatkanlah ilmu yang Engkau ajarkan kepada kami</div>
  </div>

</div>

<script>
  // Starfield
  const c = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 's';
    const sz = Math.random() * 2 + .4;
    s.style.cssText = `
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${sz}px;height:${sz}px;
      --op:${(.2 + Math.random()*.6).toFixed(2)};
      --d:${(2 + Math.random()*3).toFixed(1)}s;
      --dl:${(Math.random()*5).toFixed(1)}s;`;
    c.appendChild(s);
  }
</script>
</body>
</html>
